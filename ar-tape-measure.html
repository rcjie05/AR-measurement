<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Measure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --cyan: #00f5ff; --green: #39ff14; --amber: #ffb300; --red: #ff3b30;
    --bg-dark: #060a0f; --glass: rgba(0,245,255,0.07); --glass-border: rgba(0,245,255,0.2);
  }
  body { background: var(--bg-dark); font-family: 'Rajdhani', sans-serif; color: #fff; overflow: hidden; height: 100dvh; width: 100vw; position: fixed; touch-action: none; }
  #camera-view { position: absolute; inset: 0; object-fit: cover; width: 100%; height: 100%; display: none; }
  #no-camera-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 120% 80% at 30% 60%, rgba(0,60,80,0.6) 0%, transparent 60%), radial-gradient(ellipse 80% 60% at 75% 30%, rgba(0,40,60,0.5) 0%, transparent 60%), linear-gradient(160deg, #060a0f 0%, #0a1520 50%, #060c12 100%); }
  #grid-overlay { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
  #scanline { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0.4; animation: scan 4s linear infinite; pointer-events: none; }
  @keyframes scan { 0%{top:-2px} 100%{top:100%} }
  #measure-canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
  .corner { position: absolute; width: 28px; height: 28px; border-color: var(--cyan); border-style: solid; opacity: 0.7; }
  .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 90px; left: 16px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 90px; right: 16px; border-width: 0 2px 2px 0; }
  #top-bar { position: absolute; top: 0; left: 0; right: 0; padding: 18px 20px 12px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(6,10,15,0.85), transparent); pointer-events: none; }
  #app-title { font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--cyan); text-shadow: 0 0 20px rgba(0,245,255,0.6); text-transform: uppercase; }
  #unit-toggle { pointer-events: all; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 4px 14px; color: var(--cyan); font-family: 'Share Tech Mono', monospace; font-size: 13px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; backdrop-filter: blur(8px); }
  #unit-toggle:active { background: rgba(0,245,255,0.18); transform: scale(0.95); }
  #status-bar { position: absolute; top: 60px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; }
  #status-pill { background: rgba(6,10,15,0.75); border: 1px solid rgba(0,245,255,0.25); border-radius: 30px; padding: 5px 18px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: rgba(0,245,255,0.75); letter-spacing: 1.5px; backdrop-filter: blur(10px); }
  #measure-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -140px); text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
  #measure-display.visible { opacity: 1; }
  #measure-value { font-family: 'Share Tech Mono', monospace; font-size: 52px; font-weight: 400; color: #fff; text-shadow: 0 0 30px rgba(0,245,255,0.8), 0 0 60px rgba(0,245,255,0.4); line-height: 1; letter-spacing: -1px; }
  #measure-unit { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--cyan); opacity: 0.8; margin-top: 4px; letter-spacing: 3px; }
  #measure-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 8px; letter-spacing: 2px; font-family: 'Share Tech Mono', monospace; }
  #bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 24px 32px; background: linear-gradient(to top, rgba(6,10,15,0.95) 60%, transparent); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .action-btn { width: 52px; height: 52px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass); color: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s; flex-shrink: 0; }
  .action-btn:active { transform: scale(0.9); background: rgba(0,245,255,0.15); }
  .action-btn svg { width: 22px; height: 22px; }
  #main-btn { width: 72px; height: 72px; border-radius: 50%; border: 3px solid var(--cyan); background: transparent; position: relative; cursor: pointer; transition: all 0.2s; flex-shrink: 0; box-shadow: 0 0 20px rgba(0,245,255,0.3), inset 0 0 20px rgba(0,245,255,0.05); }
  #main-btn::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; background: var(--cyan); opacity: 0.85; transition: all 0.2s; }
  #main-btn:active { transform: scale(0.92); }
  #main-btn:active::after { opacity: 1; }
  #main-btn.has-point { border-color: var(--green); box-shadow: 0 0 20px rgba(57,255,20,0.4); }
  #main-btn.has-point::after { background: var(--green); }
  #main-btn.measuring { border-color: var(--amber); box-shadow: 0 0 20px rgba(255,179,0,0.4); }
  #main-btn.measuring::after { background: var(--amber); }
  #measurements-list { position: absolute; bottom: 90px; left: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; pointer-events: none; max-height: 180px; overflow: hidden; }
  .meas-item { background: rgba(6,10,15,0.8); border: 1px solid rgba(0,245,255,0.2); border-radius: 8px; padding: 6px 14px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(8px); animation: slideIn 0.3s ease; }
  @keyframes slideIn { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }
  .meas-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(0,245,255,0.6); letter-spacing: 1px; }
  .meas-value { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: #fff; font-weight: 600; }
  #camera-prompt { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: rgba(6,10,15,0.92); z-index: 10; padding: 40px; text-align: center; }
  #camera-prompt.hidden { display: none; }
  .cam-icon { width: 80px; height: 80px; border: 2px solid var(--cyan); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,245,255,0.3); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 20px rgba(0,245,255,0.3)} 50%{box-shadow:0 0 40px rgba(0,245,255,0.6)} }
  .cam-icon svg { width: 40px; height: 40px; color: var(--cyan); }
  #camera-prompt h2 { font-size: 24px; font-weight: 700; letter-spacing: 2px; color: var(--cyan); text-transform: uppercase; }
  #camera-prompt p { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; font-family: 'Share Tech Mono', monospace; max-width: 280px; }
  #enable-camera-btn, #demo-btn { padding: 12px 32px; border-radius: 30px; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; width: 100%; max-width: 260px; }
  #enable-camera-btn { background: var(--cyan); border: none; color: #060a0f; box-shadow: 0 0 30px rgba(0,245,255,0.4); }
  #enable-camera-btn:active { transform: scale(0.96); }
  #demo-btn { background: transparent; border: 1px solid rgba(0,245,255,0.3); color: rgba(0,245,255,0.7); }
  #demo-btn:active { background: rgba(0,245,255,0.1); }
  #crosshair { position: absolute; width: 40px; height: 40px; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.6; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: var(--cyan); }
  #crosshair::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
  #crosshair::after { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }
  .crosshair-ring { position: absolute; inset: 8px; border: 1px solid var(--cyan); border-radius: 50%; }
  #toast { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); background: rgba(0,245,255,0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 8px 20px; border-radius: 20px; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px; opacity: 0; pointer-events: none; transition: opacity 0.3s; white-space: nowrap; }
  #toast.show { opacity: 1; }
  #calibration { position: absolute; top: 100px; right: 16px; display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: all; }
  .cal-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(0,245,255,0.3); background: rgba(6,10,15,0.7); color: var(--cyan); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: all 0.15s; font-family: monospace; }
  .cal-btn:active { background: rgba(0,245,255,0.2); transform: scale(0.9); }
  #cal-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: rgba(0,245,255,0.5); letter-spacing: 1px; text-align: center; }
</style>
</head>
<body>
<video id="camera-view" autoplay playsinline muted></video>
<div id="no-camera-bg"></div>
<div id="grid-overlay"></div>
<div id="scanline"></div>
<canvas id="measure-canvas"></canvas>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div id="crosshair"><div class="crosshair-ring"></div></div>
<div id="top-bar">
  <div id="app-title">AR Measure</div>
  <button id="unit-toggle">CM</button>
</div>
<div id="status-bar"><div id="status-pill">TAP TO SET FIRST POINT</div></div>
<div id="measure-display">
  <div id="measure-value">0.0</div>
  <div id="measure-unit">CM</div>
  <div id="measure-sub">SCREEN MEASUREMENT</div>
</div>
<div id="calibration">
  <button class="cal-btn" id="cal-up">+</button>
  <div id="cal-label">SCALE</div>
  <button class="cal-btn" id="cal-down">−</button>
</div>
<div id="measurements-list"></div>
<div id="bottom-panel">
  <button class="action-btn" id="clear-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
  </button>
  <button id="main-btn"></button>
  <button class="action-btn" id="save-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 13l4 4L19 7"/></svg>
  </button>
</div>
<div id="toast"></div>
<div id="camera-prompt">
  <div class="cam-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
  </div>
  <h2>AR Measure</h2>
  <p>Enable your camera to measure real-world objects in augmented reality</p>
  <button id="enable-camera-btn">Enable Camera</button>
  <button id="demo-btn">Try Demo Mode</button>
</div>
<script>
const canvas = document.getElementById('measure-canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('camera-view');
const mainBtn = document.getElementById('main-btn');
const clearBtn = document.getElementById('clear-btn');
const saveBtn = document.getElementById('save-btn');
const unitToggle = document.getElementById('unit-toggle');
const statusPill = document.getElementById('status-pill');
const measureDisplay = document.getElementById('measure-display');
const measureValue = document.getElementById('measure-value');
const measureUnitEl = document.getElementById('measure-unit');
const measuresList = document.getElementById('measurements-list');
const cameraPrompt = document.getElementById('camera-prompt');
const toast = document.getElementById('toast');

let unit = 'cm';
let startPoint = null;
let endPoint = null;
let mousePos = { x: window.innerWidth/2, y: window.innerHeight/2 };
let measurements = [];
let PX_PER_CM = 38;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

unitToggle.addEventListener('click', () => {
  unit = unit === 'cm' ? 'in' : 'cm';
  unitToggle.textContent = unit.toUpperCase();
  measureUnitEl.textContent = unit.toUpperCase();
  updateDisplay();
});

document.getElementById('enable-camera-btn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('no-camera-bg').style.opacity = '0';
    cameraPrompt.classList.add('hidden');
    showToast('CAMERA ACTIVE', 'cyan');
  } catch(e) {
    showToast('CAMERA DENIED — DEMO MODE', 'amber');
    setTimeout(() => cameraPrompt.classList.add('hidden'), 1800);
  }
});
document.getElementById('demo-btn').addEventListener('click', () => {
  cameraPrompt.classList.add('hidden');
  showToast('DEMO MODE — TAP TO MEASURE', 'cyan');
});

document.getElementById('cal-up').addEventListener('click', () => { PX_PER_CM = Math.min(PX_PER_CM + 2, 80); updateDisplay(); showToast(`SCALE: ${PX_PER_CM}px/cm`, 'cyan'); });
document.getElementById('cal-down').addEventListener('click', () => { PX_PER_CM = Math.max(PX_PER_CM - 2, 10); updateDisplay(); showToast(`SCALE: ${PX_PER_CM}px/cm`, 'cyan'); });

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener('mousemove', e => { mousePos = getPos(e); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); mousePos = getPos(e); }, { passive: false });

function placePoint() {
  if (!startPoint) {
    startPoint = { ...mousePos };
    endPoint = null;
    mainBtn.classList.add('has-point');
    mainBtn.classList.remove('measuring');
    setStatus('TAP TO SET SECOND POINT');
    showToast('POINT 1 SET', 'cyan');
  } else {
    endPoint = { ...mousePos };
    mainBtn.classList.remove('has-point');
    mainBtn.classList.add('measuring');
    setStatus('DONE — SAVE OR CLEAR');
    updateDisplay();
    showToast('POINT 2 SET', 'green');
  }
}

canvas.addEventListener('click', placePoint);
canvas.addEventListener('touchend', e => { e.preventDefault(); placePoint(); }, { passive: false });
mainBtn.addEventListener('click', placePoint);

clearBtn.addEventListener('click', () => {
  startPoint = null; endPoint = null;
  mainBtn.classList.remove('has-point', 'measuring');
  setStatus('TAP TO SET FIRST POINT');
  measureDisplay.classList.remove('visible');
  showToast('CLEARED', 'cyan');
});

saveBtn.addEventListener('click', () => {
  if (!startPoint || !endPoint) { showToast('NO MEASUREMENT', 'amber'); return; }
  const d = getDistance();
  measurements.push({ label: '#' + (measurements.length + 1), dist: d, unit });
  renderMeasurements();
  showToast('SAVED ✓', 'green');
  startPoint = null; endPoint = null;
  mainBtn.classList.remove('has-point', 'measuring');
  setStatus('TAP TO SET FIRST POINT');
  measureDisplay.classList.remove('visible');
});

function getDistance() {
  if (!startPoint || !endPoint) return 0;
  const dx = endPoint.x - startPoint.x, dy = endPoint.y - startPoint.y;
  const cm = Math.sqrt(dx*dx + dy*dy) / PX_PER_CM;
  return unit === 'cm' ? cm : cm / 2.54;
}

function updateDisplay() {
  if (!startPoint || !endPoint) { measureDisplay.classList.remove('visible'); return; }
  const d = getDistance();
  measureValue.textContent = d.toFixed(1);
  measureUnitEl.textContent = unit.toUpperCase();
  measureDisplay.classList.add('visible');
}

function renderMeasurements() {
  measuresList.innerHTML = '';
  measurements.slice(-4).reverse().forEach(m => {
    const el = document.createElement('div');
    el.className = 'meas-item';
    el.innerHTML = `<span class="meas-label">${m.label}</span><span class="meas-value">${m.dist.toFixed(1)} ${m.unit}</span>`;
    measuresList.appendChild(el);
  });
}

function setStatus(msg) { statusPill.textContent = msg; }

let toastTimer;
function showToast(msg, color = 'cyan') {
  clearTimeout(toastTimer);
  const colors = { cyan: ['rgba(0,245,255,0.1)','#00f5ff'], green: ['rgba(57,255,20,0.12)','#39ff14'], amber: ['rgba(255,179,0,0.12)','#ffb300'], red: ['rgba(255,59,48,0.12)','#ff3b30'] };
  const [bg, fg] = colors[color] || colors.cyan;
  toast.style.background = bg; toast.style.borderColor = fg; toast.style.color = fg;
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Drawing ──
function drawDashedLine(x1,y1,x2,y2,color) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.setLineDash([8,6]);
  ctx.lineDashOffset = -(Date.now()*0.03%14);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}

function drawSolidLine(x1,y1,x2,y2,color) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}

function drawEndpoint(x,y,color,pulse) {
  const t = Date.now()/1000;
  const r = pulse ? 10+Math.sin(t*4)*3 : 10;
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.globalAlpha = 0.4;
  ctx.shadowColor = color; ctx.shadowBlur = 15;
  ctx.beginPath(); ctx.arc(x,y,r+6,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.strokeStyle = color; ctx.globalAlpha = 0.7; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.moveTo(x-20,y); ctx.lineTo(x-8,y); ctx.moveTo(x+8,y); ctx.lineTo(x+20,y);
  ctx.moveTo(x,y-20); ctx.lineTo(x,y-8); ctx.moveTo(x,y+8); ctx.lineTo(x,y+20);
  ctx.stroke();
  ctx.restore();
}

function drawTickmarks(x1,y1,x2,y2) {
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if (len<40) return;
  const nx=-dy/len, ny=dx/len;
  const count=Math.min(Math.floor(len/30),40);
  ctx.save();
  ctx.strokeStyle='rgba(0,245,255,0.5)'; ctx.lineWidth=1; ctx.setLineDash([]);
  for(let i=1;i<count;i++){
    const t=i/count, px=x1+dx*t, py=y1+dy*t;
    const tl=(i%5===0)?8:4;
    ctx.beginPath(); ctx.moveTo(px+nx*tl,py+ny*tl); ctx.lineTo(px-nx*tl,py-ny*tl); ctx.stroke();
  }
  ctx.restore();
}

function drawMidLabel(x1,y1,x2,y2) {
  if (!startPoint||!endPoint) return;
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const d=getDistance();
  const label=`${d.toFixed(1)} ${unit}`;
  const angle=Math.atan2(y2-y1,x2-x1);
  ctx.save();
  ctx.translate(mx,my); ctx.rotate(angle);
  const w=100,h=26;
  ctx.fillStyle='rgba(6,10,15,0.88)'; ctx.strokeStyle='rgba(0,245,255,0.5)'; ctx.lineWidth=1;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(-w/2,-h/2-20,w,h,8);
  else { ctx.rect(-w/2,-h/2-20,w,h); }
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font="bold 14px 'Share Tech Mono',monospace";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,245,255,0.6)'; ctx.shadowBlur=8;
  ctx.fillText(label,0,-20);
  ctx.restore();
}

function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (startPoint) {
    const end = endPoint || mousePos;
    if (!endPoint) drawDashedLine(startPoint.x,startPoint.y,end.x,end.y,'rgba(0,245,255,0.7)');
    else { drawSolidLine(startPoint.x,startPoint.y,end.x,end.y,'#00f5ff'); drawTickmarks(startPoint.x,startPoint.y,end.x,end.y); drawMidLabel(startPoint.x,startPoint.y,end.x,end.y); }
    drawEndpoint(startPoint.x,startPoint.y,'#00f5ff',!endPoint);
    if (endPoint) drawEndpoint(endPoint.x,endPoint.y,'#39ff14',false);
  }
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
